{% extends 'base.html' %}

{% block title %}Eliminar Usuario{% endblock %}

{% block content %}
  <h1>Eliminar Usuario</h1>
  <p>¿Estás seguro de que deseas eliminar al usuario <strong>{{ usuario.username }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'gestion:listar_usuarios' %}">Cancelar</a>
  </form>
{% endblock %}
