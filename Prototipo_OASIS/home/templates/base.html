<!-- home/templates/home/base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Prototipo OASIS{% endblock %}</title>
    <style>
        /* Estilos básicos */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #005f73;
            color: white;
            padding: 15px 20px;
        }
        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            margin: 20px 0;
        }
        footer {
            text-align: center;
            font-size: 0.9em;
            padding: 10px;
            border-top: 1px solid #ccc;
            color: #666;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <h1>Prototipo OASIS</h1>
        <nav>
            <a href="{% url 'inicio' %}">Inicio</a>
            <a href="{% url 'acerca_de' %}">Acerca de</a>
            <!-- Agrega aquí más enlaces si necesitas -->
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- Contenido específico de cada página -->
        {% endblock %}
    </main>

    <footer>
        &copy; 2025 Prototipo OASIS. Todos los derechos reservados.
    </footer>
</body>
</html>
